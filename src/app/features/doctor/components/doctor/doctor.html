<div class="container">
    <div class="header-row">
        <h3>Welcome Dr. Suzanne Varghese !</h3>
        <button type="button" class="btn-logout" (click)="logout()">Logout</button>
    </div>
    <hr>

    <div class="stat-cards">
        <a class="stat-card" [routerLink]="['/doctor', authService.entityId(), 'appointments']">
            <span class="stat-label">Today's Appointments</span>
            <span class="stat-value">{{ doctorService.todayAppointments().length }}</span>
        </a>
        <a class="stat-card" [routerLink]="['/doctor', authService.entityId(), 'appointments']">
            <span class="stat-label">Tomorrow's Appointments</span>
            <span class="stat-value">{{ doctorService.tomorrowAppointments().length }}</span>
        </a>
    </div>

    <div class="d-flex gap-2">
        <a class="btn btn-primary" [routerLink]="['/doctor', authService.entityId(), 'appointments']">
            My Appointments
        </a>
    </div>
</div>
