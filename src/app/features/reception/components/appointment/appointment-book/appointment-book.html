<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-lg-9">
      <div class="card shadow-sm border-0">
        <div class="card-header bg-primary text-white py-3 d-flex justify-content-between align-items-center">
          <h4 class="mb-0">
            <i class="bi bi-calendar-plus me-2"></i> Book New Appointment
          </h4>
          <a routerLink="/reception/dashboard" class="btn btn-light btn-sm">
            ← Back
          </a>
        </div>

        <div class="card-body p-4">

          <!-- Messages -->
          <div *ngIf="successMessage" class="alert alert-success alert-dismissible">
            {{ successMessage }}
            <button type="button" class="btn-close" (click)="successMessage=''"></button>
          </div>
          <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible">
            {{ errorMessage }}
            <button type="button" class="btn-close" (click)="errorMessage=''"></button>
          </div>

          <form #appointmentForm="ngForm" (ngSubmit)="bookAppointment(appointmentForm)">

            <!-- Patient -->
            <div class="mb-4">
              <label class="form-label fw-bold">Patient <span class="text-danger">*</span></label>
              
              <div *ngIf="selectedPatientName" class="alert alert-info d-flex justify-content-between align-items-center">
                <span><strong>Selected:</strong> {{ selectedPatientName }}</span>
                <a href="#" class="text-primary" (click)="clearPatientSelection($event)">Change</a>
              </div>

              <select *ngIf="!selectedPatientName" class="form-select form-select-lg" 
                      [(ngModel)]="appointment.PatientId" name="PatientId" required>
                <option value="">-- Select Patient --</option>
                <option *ngFor="let p of patients" [value]="p.PatientId">
                  {{ p.PatientName }} ({{ p.Mmrid }})
                </option>
              </select>

              <small class="text-muted d-block mt-1">
                <a routerLink="/reception/patients/search" class="text-primary">Can't find patient? Search here</a>
              </small>
            </div>

            <!-- Doctor -->
            <div class="mb-4">
              <label class="form-label fw-bold">Doctor <span class="text-danger">*</span></label>
              <select class="form-select form-select-lg" [(ngModel)]="appointment.DoctorId" name="DoctorId" required>
                <option value="">-- Select Doctor --</option>
                <option *ngFor="let d of doctors" [value]="d.DoctorId">
                  {{ d.DoctorName }} - {{ d.Specialization }}
                </option>
              </select>
            </div>

            <!-- Date Selection -->
            <div class="mb-4">
              <label class="form-label fw-bold">Appointment Date <span class="text-danger">*</span></label>
              
              <div class="btn-group w-100" role="group">
                <button type="button" 
                        class="btn btn-primary flex-fill" 
                        [class.active]="appointment.AppointmentDate === todayDate"
                        (click)="setDate('today')">
                  Today ({{ todayDate | date:'EEE dd MMM' }})
                </button>
                <button type="button" 
                        class="btn btn-outline-primary flex-fill" 
                        [class.active]="appointment.AppointmentDate === tomorrowDate"
                        (click)="setDate('tomorrow')">
                  Tomorrow ({{ tomorrowDate | date:'EEE dd MMM' }})
                </button>
              </div>
            </div>

            <!-- Time Slot -->
            <div class="mb-4">
              <label class="form-label fw-bold">Time Slot <span class="text-danger">*</span></label>
              <select class="form-select form-select-lg" 
                      [(ngModel)]="appointment.TimeSlot" 
                      name="TimeSlot" required>
                <option value="">-- Select Time Slot --</option>
                <option *ngFor="let slot of timeSlots" [value]="slot">{{ slot }}</option>
              </select>
              <div class="text-success mt-2" *ngIf="timeSlots.length > 0">
                Available Slots: {{ timeSlots.length }}
            </div>
            
            <div class="text-danger mt-2" *ngIf="timeSlots.length === 0">
                No slots available.
            </div>
            </div>

            <div class="d-flex gap-3 mt-4">
              <button type="submit" class="btn btn-success btn-lg flex-grow-1" [disabled]="isLoading">
                <i class="bi bi-check-circle"></i> 
                {{ isLoading ? 'Booking...' : 'Book Appointment' }}
              </button>
              <button type="button" class="btn btn-outline-secondary btn-lg" routerLink="/reception/dashboard">
                Cancel
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
