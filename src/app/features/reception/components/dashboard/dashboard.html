<div class="container mt-4">
    <h2 class="mb-4">Receptionist Dashboard</h2>
  
    <div class="row g-4">
      <div class="col-md-4">
        <div class="card text-center h-100">
          <div class="card-body">
            <h5>Total Patients</h5>
            <h2 class="text-primary">{{ totalPatients() }}</h2>
          </div>
        </div>
      </div>
  
      <div class="col-md-4">
        <div class="card text-center h-100">
          <div class="card-body">
            <h5>Today's Appointments</h5>
            <h2 class="text-success">{{ todayAppointments() }}</h2>
          </div>
        </div>
      </div>
  
      <div class="col-md-4">
        <div class="card text-center h-100">
          <div class="card-body">
            <h5>Today's Queue</h5>
            <h2 class="text-info">{{ todaysQueue().length }}</h2>
          </div>
        </div>
      </div>
    </div>
  
    <div class="mt-4">
      <h5>Recent Queue</h5>
      <ul class="list-group">
        <li *ngFor="let appt of todaysQueue()" class="list-group-item">
          Token #{{ appt.TokenNumber }} - {{ appt.PatientName }} ({{ appt.TimeSlot }})
        </li>
      </ul>
    </div>
  </div>
